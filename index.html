    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "offers": [
        { "@type": "Offer", "name": "Free", "price": "0", "priceCurrency": "ARS" },
        { "@type": "Offer", "name": "Plus", "price": "9900", "priceCurrency": "ARS" },

      ]
    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es un acompañante terapéutico?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un acompañante terapéutico (AT) es un profesional de la salud que brinda apoyo personalizado a personas con discapacidad, padecimientos de salud mental o necesidades de acompañamiento cotidiano, siguiendo las indicaciones del equipo tratante. En rondas, todos los ATs pasan por una verificación manual de certificados antes de recibir el distintivo de verificado."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo encuentro un acompañante terapéutico cerca de mí en CABA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En rondas podés filtrar acompañantes terapéuticos por barrio, población y área de acompañamiento, y verlos en mapa o lista. Cada perfil muestra certificación verificada, experiencia y salidas realizadas antes de que envíes tu solicitud de contacto."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta usar rondas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Para las familias, rondas es gratis siempre. Los acompañantes terapéuticos tienen un plan Free ($0) con salidas ilimitadas, y planes pagos desde ARS 9.900 por mes con informes y planificador con IA."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo verifica rondas a los acompañantes terapéuticos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Los certificados de cada AT se revisan manualmente antes de otorgar el distintivo de verificado. No hay verificación automática: una persona revisa la documentación profesional de cada acompañante que se suma a la red."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué datos de la persona acompañada se comparten en la app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Ninguno se publica: en las salidas solo aparece el rango etario y el contexto de la actividad. La ubicación se comparte únicamente durante la salida activa y se elimina a las 48 horas, y las familias deciden qué información incluir en cada solicitud de contacto."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué beneficios tiene el CUD para las salidas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El Certificado Único de Discapacidad (CUD) habilita transporte gratuito y entrada sin cargo a muchos parques y museos para la persona y su acompañante. rondas incluye una guía de actividades gratuitas con CUD para planificar salidas accesibles en Buenos Aires."
          }
        }
      ]
    }
    </script>
